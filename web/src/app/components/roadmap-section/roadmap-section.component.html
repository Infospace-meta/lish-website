<section class="py-40 bg-primary text-white overflow-hidden">
  <div class="max-w-7xl mx-auto px-8 mb-24">
    <h2 class="text-4xl md:text-6xl font-medium mb-6">Future Roadmap</h2>
    <p class="text-white/40 max-w-lg">
      Our trajectory towards a more equitable digital landscape.
    </p>
  </div>

  <div
    class="flex overflow-x-auto no-scrollbar gap-0 pl-8 md:pl-[calc((100vw-1280px)/2+32px)]"
  >
    <div
      *ngFor="let phase of phases"
      class="min-w-[400px] border-l border-white/10 p-12 flex flex-col justify-between h-[400px] group"
    >
      <div>
        <div
          class="w-2.5 h-2.5 rounded-full mb-8"
          [ngClass]="phase.active ? 'bg-accent' : 'bg-white/20'"
        ></div>
        <span
          class="text-xs font-bold uppercase tracking-widest text-white/40 mb-4 block"
          >Phase {{ phase.id }}</span
        >
        <h3 class="text-2xl font-medium mb-6">{{ phase.title }}</h3>
        <p class="text-white/40 leading-relaxed font-light">{{ phase.desc }}</p>
      </div>
      <div
        class="h-px bg-white/10 w-full group-hover:bg-accent transition-colors"
      ></div>
    </div>
  </div>
</section>
