<section class="px-8 font-poppins py-40 bg-white">
  <div class="max-w-7xl mx-auto">
    <div class="grid md:grid-cols-2 gap-24 items-center">
      <div class="relative reveal-text delay-1">
        <div
          class="rounded-3xl overflow-hidden aspect-[4/5] relative bg-soft-grey shadow-2xl"
        >
          <img
            alt="Abstract AI Visualization"
            class="w-full h-full object-cover transition-all duration-700 opaecity-90 transition-transform duration-700 hover:scale-105"
            src="https://res.cloudinary.com/dpfcle0os/image/upload/v1772716046/samples/Lish-website/IMG_4945_mizqkg.jpg"
          />
          <div
            class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-transparent"
          ></div>
        </div>

        <div
          class="absolute -bottom-6 -right-6 bg-primary text-white p-8 rounded-2xl shadow-2xl hidden lg:block reveal-text delay-3"
        >
          <p
            class="text-[10px] font-bold uppercase tracking-[0.3em] opacity-60 mb-2"
          >
            Methodology
          </p>
          <p class="text-xl font-medium">Lish Labs Sprint</p>
        </div>
      </div>

      <div>
        <span
          class="inline-block text-[11px] font-semibold uppercase tracking-[0.25em] text-accent mb-8 reveal-text delay-1"
        >
          Our Framework
        </span>
        <h2
          class="text-5xl md:text-6xl font-medium mb-16 leading-[1.1] text-primary tracking-tight reveal-text delay-2"
        >
          Strategic methodology for
          <span class="text-accent">sustainable innovation.</span>
        </h2>

        <div class="space-y-2">
          <div
            *ngFor="let step of frameworkSteps; let i = index"
            class="group pb-10 border-b border-black/5 reveal-text"
            [style.animation-delay]="0.3 + i * 0.15 + 's'"
          >
            <div class="flex items-start gap-6 pt-8">
              <span
                class="text-accent font-mono text-lg opacity-40 group-hover:opacity-100 transition-opacity duration-500"
              >
                {{ step.id }}
              </span>
              <div class="space-y-4">
                <h3
                  class="font-bold text-sm uppercase tracking-widest text-primary group-hover:text-accent transition-colors duration-500"
                >
                  {{ step.title }}
                </h3>
                <p
                  class="text-text-muted text-lg leading-relaxed font-light max-w-md"
                >
                  {{ step.desc }}
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
