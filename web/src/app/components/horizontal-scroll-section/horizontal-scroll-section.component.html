<div #pinWrapper [style.height.px]="wrapperHeight" class="relative bg-white">
  <div class="sticky top-0 h-screen overflow-hidden flex flex-col justify-center">

    <div class="max-w-7xl mx-auto px-8 mb-12 w-full">
      <ng-content select="[slot=heading]"></ng-content>
    </div>

    <div #cardsTrack class="flex gap-6 pl-8 pr-24 will-change-transform">
      <ng-content select="[slot=cards]"></ng-content>
    </div>

  </div>

</div>
