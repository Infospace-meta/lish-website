<div class="bg-white rounded-4xl overflow-hidden border border-black/5">
  @if (imageUrl) {
    <div class="w-full aspect-[16/9] bg-soft-grey overflow-hidden">
      <img
        [src]="imageUrl"
        [alt]="imageAlt"
        class="w-full h-full object-cover"
      />
    </div>
  }
  <div class="p-10">
    <div class="flex items-center gap-4 mb-4">
      <span
        class="text-[11px] font-semibold uppercase tracking-[0.2em] text-accent"
        >{{ index }}</span
      >
      <div
        class="w-10 h-10 rounded-xl bg-soft-grey flex items-center justify-center"
      >
        <span class="material-symbols-outlined text-primary text-xl">{{
          icon
        }}</span>
      </div>
    </div>
    <h3 class="text-2xl font-medium text-primary mb-3">{{ title }}</h3>
    <p class="text-text-muted font-light leading-relaxed">{{ description }}</p>
  </div>
</div>
