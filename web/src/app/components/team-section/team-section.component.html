<section
  appScrollReveal
  class="px-8 font-poppins py-40 bg-white overflow-hidden"
>
  <div class="max-w-7xl mx-auto">
    <div class="grid lg:grid-cols-2 gap-16 items-start mb-32">
      <div class="reveal-text delay-1">
        <span
          class="text-[11px] font-bold uppercase tracking-widest text-accent mb-8 block"
          >Team</span
        >
        <h2
          class="text-6xl md:text-7xl font-medium leading-[0.9] text-primary max-w-md"
        >
          The Humans Behind
          <span class="underline decoration-accent underline-offset-8"
            >the Lab.</span
          >
        </h2>
        <p
          class="mt-8 text-xl text-text-muted font-light max-w-sm leading-relaxed"
        >
          Meet the world-class researchers and engineers pioneering the next
          generation of AI solutions at Lish
        </p>
      </div>

      <div class="relative group reveal-text delay-3">
        <div
          class="aspect-[3/4] rounded-sm overflow-hidden bg-soft-grey shadow-sm"
        >
          <img
            [src]="teamMembers[0].image"
            class="w-full h-full object-cover transition-all duration-1000 group-hover:scale-110 group-hover:rotate-1"
          />
        </div>
        <div
          class="mt-6 flex items-center gap-4 bg-white p-6 absolute -bottom-6 left-6 rounded-sm border border-black/5 shadow-2xl"
        >
          <div
            class="w-10 h-10 bg-primary flex items-center justify-center rounded-sm"
          >
            <span class="material-symbols-outlined text-white text-xl"
              >analytics</span
            >
          </div>
          <div>
            <p
              class="text-[13px] font-bold uppercase tracking-widest text-text-muted"
            >
              {{ teamMembers[0].name }}
            </p>
            <p class="text-sm font-medium text-primary">
              {{ teamMembers[0].role }}
            </p>
          </div>
        </div>
      </div>
    </div>

    <div
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-8 gap-y-20"
    >
      <div
        *ngFor="let member of teamMembers.slice(1); let i = index"
        class="group reveal-text"
        [style.animation-delay]="0.1 * i + 's'"
      >
        <div
          class="relative aspect-[3/4] rounded-sm overflow-hidden bg-soft-grey mb-8 shadow-sm group-hover:shadow-2xl transition-all"
        >
          <img
            [src]="member.image"
            [alt]="member.name"
            class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000 group-hover:scale-110"
          />
          <div
            class="absolute bottom-6 right-6 w-10 h-10 bg-black flex items-center justify-center rounded-sm opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0"
          >
            <span class="material-symbols-outlined text-white">add</span>
          </div>
        </div>

        <h4 class="font-medium text-xl text-primary">{{ member.name }}</h4>
        <div class="flex items-center gap-2 mt-2">
          <div class="w-1.5 h-1.5 bg-accent rounded-full"></div>
          <p class="text-text-muted text-sm font-light leading-snug">
            {{ member.role }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
