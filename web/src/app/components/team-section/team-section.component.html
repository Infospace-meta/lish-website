<section class="px-8 py-40 bg-white">
  <div class="max-w-7xl mx-auto">
    <div class="mb-24 flex justify-between items-end">
      <h2 class="text-4xl md:text-6xl font-medium text-primary">
        The Humans Behind the Lab.
      </h2>
      <a
        class="text-xs font-bold uppercase tracking-widest border-b border-black pb-2 text-primary hover:opacity-60 transition-opacity"
        href="#"
        >Careers</a
      >
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      <div *ngFor="let member of teamMembers" class="group">
        <div
          class="aspect-square rounded-2xl overflow-hidden mb-6 bg-soft-grey shadow-sm transition-shadow duration-500 group-hover:shadow-xl"
        >
          <img
            [src]="member.image"
            [alt]="member.name"
            class="w-full h-full object-cover grayscale transition-transform duration-700 group-hover:scale-105 group-hover:grayscale-0"
          />
        </div>
        <h4 class="font-medium text-lg text-primary">{{ member.name }}</h4>
        <p class="text-text-muted text-sm mt-1">{{ member.role }}</p>
      </div>
    </div>
  </div>
</section>
