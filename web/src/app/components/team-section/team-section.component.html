<section
  appScrollReveal
  class="px-[clamp(1.25rem,4vw,2.5rem)] py-[clamp(5rem,10vw,10rem)] bg-white overflow-hidden font-poppins"
>
  <div class="max-w-[1400px] mx-auto">
    <!-- Top Layout -->
    <div
      class="grid grid-cols-1 lg:grid-cols-2 gap-[clamp(2rem,6vw,6rem)] items-start mb-[clamp(4rem,10vw,8rem)]"
    >
      <!-- Text Block -->
      <div class="reveal-text delay-1 order-1">
        <span
          class="text-[10px] sm:text-[11px] font-bold uppercase tracking-[0.25em] text-accent mb-6 block"
        >
          Team
        </span>

        <h2
          class="text-[clamp(2.2rem,5vw,4.5rem)] font-medium leading-[1.1] text-primary max-w-xl"
        >
          The Humans Behind
          <span
            class="underline decoration-accent underline-offset-[6px] sm:underline-offset-[10px]"
          >
            the Lab.
          </span>
        </h2>

        <p
          class="mt-6 text-[clamp(1rem,2vw,1.25rem)] text-text-muted font-light max-w-md leading-relaxed"
        >
          Meet the world-class researchers and engineers pioneering the next
          generation of AI solutions at Lish.
        </p>
      </div>

      <!-- Featured Member -->
      <div
        class="relative group reveal-text delay-3 order-2 w-full max-w-md lg:max-w-none mx-auto"
      >
        <div
          class="aspect-[3/4] rounded-md overflow-hidden bg-soft-grey shadow-sm"
        >
          <img
            [src]="teamMembers[0].image"
            class="w-full h-full object-cover transition-all duration-1000 group-hover:scale-110 group-hover:rotate-1"
          />
        </div>

        <!-- Floating Card -->
        <div
          class="mt-5 sm:mt-0 flex items-center gap-4 bg-white p-4 sm:p-6 sm:absolute sm:-bottom-6 sm:left-6 rounded-md border border-black/5 shadow-xl"
        >
          <div
            class="w-10 h-10 bg-primary flex-shrink-0 flex items-center justify-center rounded-md"
          >
            <span class="material-symbols-outlined text-white text-xl">
              analytics
            </span>
          </div>

          <div>
            <p
              class="text-[11px] sm:text-[13px] font-bold uppercase tracking-widest text-text-muted"
            >
              {{ teamMembers[0].name }}
            </p>

            <p class="text-sm font-medium text-primary">
              {{ teamMembers[0].role }}
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Team Grid -->
    <div
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-x-[clamp(1.5rem,4vw,2.5rem)] gap-y-[clamp(3rem,6vw,5rem)]"
    >
      <div
        *ngFor="let member of teamMembers.slice(1); let i = index"
        class="group reveal-text"
        [style.animation-delay]="0.1 * i + 's'"
      >
        <div
          class="relative aspect-[3/4] rounded-md overflow-hidden bg-soft-grey mb-6 shadow-sm group-hover:shadow-2xl transition-all duration-500"
        >
          <img
            [src]="member.image"
            [alt]="member.name"
            class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-1000 group-hover:scale-110"
          />

          <div
            class="absolute bottom-4 right-4 w-10 h-10 bg-black flex items-center justify-center rounded-md opacity-100 lg:opacity-0 lg:group-hover:opacity-100 transition-all translate-y-0 lg:translate-y-2 lg:group-hover:translate-y-0"
          >
            <span class="material-symbols-outlined text-white text-xl">
              add
            </span>
          </div>
        </div>

        <h4 class="font-medium text-[clamp(1.1rem,2vw,1.25rem)] text-primary">
          {{ member.name }}
        </h4>

        <div class="flex items-center gap-2 mt-2">
          <div class="w-1.5 h-1.5 bg-accent rounded-full flex-shrink-0"></div>

          <p class="text-text-muted text-sm font-light leading-snug">
            {{ member.role }}
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
